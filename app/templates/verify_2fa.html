{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4>🔐 Two-Factor Authentication</h4>
            </div>
            <div class="card-body text-center">
                <p>Enter the 6-digit code from your Authenticator App:</p>
                
                <form method="POST">
                    <input type="text" name="token" class="form-control form-control-lg text-center mb-3" 
                           maxlength="6" autofocus required>
                    <button type="submit" class="btn btn-success btn-lg w-100">Verify Code</button>
                </form>
            </div>
        </div>

        <!-- QR Code -->
        <div class="card mt-4 shadow">
            <div class="card-body text-center">
                <h6>Scan this QR Code with Google Authenticator / Microsoft Authenticator</h6>
                <img src="{{ qr_code }}" alt="2FA QR Code" class="img-fluid border p-3 bg-white" style="max-width: 280px;">
                
                <hr>
                <small class="text-muted">
                    Can't scan? Use this secret key:<br>
                    <strong>{{ secret }}</strong>
                </small>
            </div>
        </div>
    </div>
</div>

{% endblock %}
