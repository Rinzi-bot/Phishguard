{% extends "base.html" %}
{% block content %}

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">🛡️ Register for PhishGuard</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   required minlength="3" placeholder="At least 3 characters">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   required minlength="6" placeholder="At least 6 characters">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password_confirm" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm" 
                                   required minlength="6" placeholder="Confirm your password">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>
                    </form>
                    
                    <hr>
                    
                    <p class="text-center mb-0">
                        Already have an account? 
                        <a href="{{ url_for('auth.login') }}">Login here</a>
                    </p>
                </div>
            </div>
            
            <div class="alert alert-info mt-3" role="alert">
                <small>
                    <strong>New users register as:</strong> Analyst<br>
                    <strong>Admin promotion:</strong> Contact your administrator
                </small>
            </div>
        </div>
    </div>
</div>

{% endblock %}
